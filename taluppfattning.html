<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Taluppfattning – Matematikbegrepp</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Nunito', 'Roboto', Arial, sans-serif;}
  </style>
</head>
<body class="bg-purple-50 min-h-screen">
  <header class="w-full py-7 bg-purple-200">
    <a href="index.html" class="text-purple-600 hover:text-purple-900 text-lg font-bold ml-7">&larr; Hem</a>
    <h1 class="text-2xl md:text-3xl font-extrabold text-center text-purple-900 mt-3">Taluppfattning</h1>
  </header>
  <main class="max-w-3xl mx-auto px-4 pt-5 pb-12">
    <h2 class="text-xl font-bold text-purple-700 mb-5">Begreppskort</h2>
    <div class="flex flex-col gap-6">
      <!-- Begreppskort 1 -->
      <div class="rounded-2xl shadow border-2 border-purple-200 bg-white px-7 py-5">
        <h3 class="font-bold text-purple-800 mb-2 text-lg">Siffra &amp; Tal</h3>
        <p><span class="bg-violet-100 text-violet-800 px-2 rounded font-semibold">Siffra</span> är någon av symbolerna 0–9.<br>
          Ett <span class="bg-pink-100 text-pink-800 px-2 rounded font-semibold">tal</span> är gjort av en eller flera siffror, t.ex. 42.</p>
      </div>
      <!-- Begreppskort 2 -->
      <div class="rounded-2xl shadow border-2 border-purple-200 bg-white px-7 py-5">
        <h3 class="font-bold text-purple-800 mb-2 text-lg">Ental, tiotal, hundratal</h3>
        <p>I talet 781:<br>1 är ental<br>8 är tiotal<br>7 är hundratal</p>
      </div>
      <!-- Fler kort... -->
    </div>
  </main>
</body>
</html>
