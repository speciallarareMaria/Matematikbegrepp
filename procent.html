<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Procent – Matematikbegrepp</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Nunito', 'Roboto', Arial, sans-serif;}
    .bg-procent {
      background: linear-gradient(160deg, #f4c7f8 0%, #e5d9fa 100%);
    }
    .procent-card {
      background: #fff;
      border: 1.5px dotted #d6a2fc;
      border-radius: 24px;
      box-shadow: 0 3px 18px #cfaad326;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      min-width: 270px;
      max-width: 500px;
      margin: 0 auto;
    }
    .procent-card img, .procent-card svg {
      margin-top: 1rem; margin-bottom: .2rem; max-width: 95%;
      align-self: center;
    }
    .kort-rubrik {
      font-size: 1.2rem;
      font-weight: 700;
      color: #9134b8;
      margin-bottom: 12px;
      letter-spacing: 0.02em;
    }
    .kort-kommentar {
      color: #8c38a8;
      font-weight: 700;
      margin-bottom: 0.1rem;
      margin-top: 1.7rem;
      font-size: 1.14rem;
    }
    .kort-forklaring {
      color: #5c2a6b;
      font-size: 1rem;
      margin-bottom: .6rem;
    }
    .sektiontxt {
      font-size: 1.04rem;
      color: #6c227d;
      margin-bottom: 0.5rem;
    }
    .tabell-scroll {
      overflow-x: auto;
    }
    .math-table th, .math-table td { padding: 3px 9px; text-align:left;}
    .math-table th {
      border-bottom: 2px solid #cfc3f1;
      color: #4d3385;
      font-weight: bold;
      font-size: 1.06rem;
    }
    .math-table td { font-size: 1rem;}
    .math-table .d1 { color:#51b563; font-weight:bold;}
    .math-table .d2 { color:#e87290; font-weight:bold;}
    .math-table .d3 { color:#4b8aee; font-weight:bold;}
    .math-formel {
      font-family: 'Roboto Mono', monospace;
      background: #faf2ff;
      padding: 0.2em 0.5em;
      border-radius: 6px;
      font-size: 1rem;
      margin-bottom:.2rem;
      display: inline-block;
    }
    @media (max-width: 900px) {
      .procent-card { padding: 1.2rem 0.7rem; min-width:unset; }
    }
  </style>
</head>
