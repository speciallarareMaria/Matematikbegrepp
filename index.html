<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">

    <title>Interaktiva matematikverktyg för elever</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        soft: {
                            bg: '#f4f3ef',
                            surface: '#ffffff',
                            text: '#4a4b50',
                            muted: '#8c8d92',
                            border: '#d6d4d0',
                            blue: '#5b80a5',
                            blueLight: '#8db1d1',
                            green: '#4f7c75',
                            greenLight: '#8bb39c',
                            purple: '#6a6281',
                            purpleLight: '#938db3',
                            pink: '#a85c72',
                            pinkLight: '#d58b99',
                            yellow: '#dec894',
                            yellowDark: '#b8a36e',
                            teal: '#3d8a8a',
                            tealLight: '#72b5b5'
                        }
                    }
                }
            }

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
        body { font-family: 'Nunito', sans-serif; touch-action: none; overflow: hidden; background-color: #f4f3ef; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d6d4d0; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #8c8d92; }
        .workspace { position: relative; width: 100%; height: 100%; overflow: hidden; background-image: radial-gradient(#d6d4d0 1px, transparent 1px); background-size: 20px 20px; }
        .draggable-item { position: absolute; cursor: grab; user-select: none; touch-action: none; filter: drop-shadow(0 4px 6px rgba(74,75,80,0.1)); transition: filter 0.2s; transform-origin: center center; }
        .draggable-item:active { cursor: grabbing; filter: drop-shadow(0 8px 15px rgba(74,75,80,0.2)); z-index: 50 !important; }
        .draggable-item.selected { /* no outline */ }
        .clock-hand { cursor: pointer; }
        .clock-hand:hover { opacity: 0.75; }
        .view-section { display: none; opacity: 0; transition: opacity 0.3s ease; }
        .view-section.active { display: flex; opacity: 1; }
        #canvas-container { width: 100%; height: 100%; cursor: move; }
        .geo-btn { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; padding:6px 4px; background:#f4f3ef; border:1px solid #d6d4d0; border-radius:10px; font-size:11px; font-weight:700; color:#4a4b50; cursor:pointer; transition:all 0.15s; }
        .geo-btn:hover { background:white; box-shadow:0 2px 8px rgba(74,75,80,0.12); }
        .geo-3d-card { position:absolute; cursor:grab; user-select:none; touch-action:none; transform-origin:top left; }
        .geo-3d-card:active { cursor:grabbing; }
        .angle-card { position:absolute; user-select:none; touch-action:none; transform-origin:top left; border-radius:14px; box-shadow:0 4px 16px rgba(74,75,80,0.15); border:1px solid #d6d4d0; background:white; overflow:visible; }
        .geo-resize-handle { position:absolute; bottom:-4px; right:-4px; width:22px; height:22px; background:white; border:2px solid #8c8d92; border-radius:5px; cursor:nwse-resize; display:flex; align-items:center; justify-content:center; font-size:15px; color:#4a4b50; user-select:none; touch-action:none; z-index:10; font-weight:900; box-shadow:0 2px 6px rgba(0,0,0,0.15); }
        .math-grid-cell { transition: all 0.1s; }
        .math-grid-cell:hover { background-color: #f4f3ef; transform: scale(1.1); z-index: 10; font-weight: bold; border-radius: 4px; }
        .highlight-row-col { background-color: #f4f3ef; }

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matematikbegrepp</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <p class="site-label">Matematikbegrepp</p>
      <h1>Matematikbegrepp</h1>
      <p class="lead">
        En enkel samling med tydliga genomgångar, exempel och övningar i matematik.
      </p>
    </div>
  </header>

  <main class="container content">
    <section class="home-intro">
      <h2>Välj område</h2>
      <p>
        Här kan du arbeta med olika delar av matematiken. Börja med procent.
      </p>
    </section>

    <section class="home-grid">
      <a class="subject-card subject-card-active" href="procent.html">
        <span class="section-tag">Öppet nu</span>
        <h3>Procent</h3>
        <p>Begrepp, andelen-delen-det hela, ökning, minskning och rabatt.</p>
      </a>

      <div class="subject-card subject-card-soon">
        <span class="section-tag">Kommer snart</span>
        <h3>Bråk</h3>
        <p>Förlängning, förkortning, addition, subtraktion och multiplikation.</p>
      </div>

      <div class="subject-card subject-card-soon">
        <span class="section-tag">Kommer snart</span>
        <h3>Decimaltal</h3>
        <p>Platsvärde, jämförelse, omvandling och räkning med decimaltal.</p>
      </div>

      <div class="subject-card subject-card-soon">
        <span class="section-tag">Kommer snart</span>
        <h3>Geometri</h3>
        <p>Former, vinklar, omkrets, area och skala.</p>
      </div>
    </section>
  </main>
    // ─── Smartboard / Presentation mode ───────────────────────────────────────

    /** Toggle fullscreen for the entire page. Works for all views. */
    function toggleViewFullscreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(() => {});
        } else {
            document.exitFullscreen();
        }
    }

    /**
     * Toggle the slide-in control panel for the given view in presenting mode.
     * @param {string} viewId - The view whose panel should be toggled.
     */
    function toggleViewSidebar(viewId) {
        const viewSection = document.getElementById('view-' + viewId);
        if (!viewSection) return;
        const isVisible = viewSection.classList.toggle('panel-visible');
        const lbl = document.getElementById(viewId + '-ctrl-lbl');
        if (lbl) lbl.textContent = isVisible ? 'Dölj' : 'Kontroller';
        const panel = document.getElementById(viewId + '-float-panel');
        if (panel) {
            const toggleBtn = panel.querySelector('button:first-child');
            if (toggleBtn) toggleBtn.setAttribute('aria-expanded', isVisible ? 'true' : 'false');
        }
    }

    document.addEventListener('fullscreenchange', () => {
        const isFs = !!document.fullscreenElement;
        const viewSection = document.getElementById('view-' + currentView);
        if (viewSection) {
            viewSection.classList.toggle('presenting', isFs);
            if (!isFs) {
                viewSection.classList.remove('panel-visible');
                const lbl = document.getElementById(currentView + '-ctrl-lbl');
                if (lbl) lbl.textContent = 'Kontroller';
            }
        }
        const btn = document.getElementById(currentView + '-fs-btn');
        if (btn) {
            btn.innerHTML = isFs
                ? '<i class="fas fa-compress"></i> Avsluta helskärm'
                : '<i class="fas fa-expand"></i> Helskärm';
        }
        // Re-render views that depend on canvas size after fullscreen toggle
        VIEW_REGISTRY[currentView]?.onResize && setTimeout(VIEW_REGISTRY[currentView].onResize, 80);
    });

  <footer class="site-footer">
    <div class="container">
      <p>Matematikbegrepp</p>
    </div>
  </footer>
</body>
</html>
