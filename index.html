<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Matematikbegrepp</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Nunito', 'Roboto', Arial, sans-serif; }
    /* Bakgrund: mjuk gradient från lila till rosa */
    .math-gradient-bg {
      background: linear-gradient(160deg, #CEC9F8 0%, #ffdff4 90%);
    }
    .area-btn {
      @apply flex items-center gap-3 bg-white bg-opacity-80 shadow rounded-xl px-6 py-4 text-lg font-bold text-gray-700 hover:bg-purple-100 hover:scale-105 transition-all duration-200 mb-3;
    }
    .area-icon {
      @apply text-2xl text-purple-400 bg-purple-100 rounded-lg w-10 h-10 flex items-center justify-center;
      min-width: 2.5rem;
    }
    .headline-shadow {
      text-shadow: 0 2px 16px #b7b4e0a0;
    }
  </style>
</head>
<body class="math-gradient-bg min-h-screen">
  <header class="w-full py-8">
    <h1 class="text-3xl md:text-4xl font-extrabold text-center text-purple-900 headline-shadow select-none">
      Matematikbegrepp
    </h1>
    <p class="text-center text-lg mt-2 text-gray-700">Upptäck och träna på matematiska områden!</p>
  </header>
  <main class="max-w-3xl mx-auto px-4 pt-4 pb-14">
    <h2 class="text-xl md:text-2xl font-bold text-purple-600 mb-5">Matematikområden</h2>
    <!-- Områdesknappar -->
    <div class="flex flex-col gap-2">
      <button class="area-btn" onclick="gotoArea('taluppfattning')">
        <span class="area-icon">13</span>
        Taluppfattning
      </button>
      <button class="area-btn" onclick="gotoArea('geometri')">
        <span class="area-icon">&#9651;</span>
        Geometri
      </button>
      <button class="area-btn" onclick="gotoArea('procent')">
        <span class="area-icon">%</span>
        Procent
      </button>
      <button class="area-btn" onclick="gotoArea('brak')">
        <span class="area-icon">&#188;</span>
        Bråk
      </button>
      <button class="area-btn" onclick="gotoArea('problem')">
        <span class="area-icon">&#9633;</span>
        Problemlösning
      </button>
      <button class="area-btn" onclick="gotoArea('klockan')">
        <span class="area-icon">&#128336;</span>
        Klockan
      </button>
      <button class="area-btn" onclick="gotoArea('enheter')">
        <span class="area-icon">&#8491;</span>
        Enheter
      </button>
      <button class="area-btn" onclick="gotoArea('uppstallningar')">
        <span class="area-icon">&#8597;</span>
        Uppställningar
      </button>
    </div>
  </main>
  <!-- JS för navigation (kan byggas ut till riktiga sidor/sektioner) -->
  <script>
    function gotoArea(area) {
      alert('Här skulle du gå vidare till sidan/sektionen för: ' + area.charAt(0).toUpperCase() + area.slice(1));
      // Exempel: window.location.href = area + '.html'
      // eller visa sektion med JS/dynamisk navigation!
    }
  </script>
</body>
</html>
