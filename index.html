<!DOCTYPE html>

<head>

  <title>Matematikbegrepp</title>

  <style>
    body { font-family: 'Nunito', 'Roboto', Arial, sans-serif; }
    .area-card {

  <main class="max-w-2xl mx-auto px-4 pt-4 pb-12">
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
