<!-- Introduktion -->
<div style="background:#e5f4fc; padding: 15px; border-radius: 10px; margin-bottom:20px;">
  <strong>Behöver du hjälp med mattebegrepp?</strong>
  <p>
    Här hittar du enkla förklaringar och exempel på vanliga matematiska ord och metoder. Klicka på knapparna nedan för att få hjälp med det du undrar över!
  </p>
</div>

<!-- Begreppsknappar -->
<div style="display: flex; gap: 20px; margin-bottom:20px;">
  <button onclick="visaInfo('enheter')" title="Tips om enhetsomvandling">Enhetsomvandling</button>
  <span style="font-size:0.9em; color:#555;">Hur du växlar mellan olika måttenheter</span>
</div>
<div style="display: flex; gap: 20px;margin-bottom:20px;">
  <button onclick="visaInfo('uppstallning')" title="Tips om uppställning av tal">Uppställning av tal</button>
  <span style="font-size:0.9em; color:#555;">Så här ställer du upp tal vid beräkning</span>
</div>

<!-- Plats för innehåll som visas när man klickar -->
<div id="info-ruta" style="min-height: 60px; margin-top:20px;"></div>

<script>
function visaInfo(begrepp) {
  let ruta = document.getElementById('info-ruta');
  if(begrepp === 'enheter') {
    ruta.innerHTML = `<strong>Enhetsomvandling</strong><br>
      <ul>
        <li>Du kan t.ex omvandla mellan meter och centimeter.</li>
        <li>1 meter = 100 centimeter</li>
        <li>Exempel: 3 meter = 3 × 100 = 300 centimeter</li>
      </ul>`;
  } else if(begrepp === 'uppstallning') {
    ruta.innerHTML = `<strong>Uppställning av tal</strong><br>
      <ul>
        <li>När det blir svårt att räkna i huvudet kan du ställa upp talen.</li>
        <li>Ställ siffrorna under varandra med ental under ental, tiotal under tiotal osv.</li>
        <li>Exempel:<br> <pre>  56<br>+ 47<br>----</pre></li>
      </ul>`;
  }
}
</script>
