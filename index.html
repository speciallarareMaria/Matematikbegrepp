<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Matematikbegrepp — Startsida</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(160deg, #f7e2fa, #eedbfd 90%);}
    .knapp { transition: box-shadow 0.18s, transform 0.18s; cursor: pointer;}
    .knapp:hover { box-shadow: 0 8px 32px #c299f480; transform: translateY(-2px) scale(1.024);}
  </style>
</head>
<body class="min-h-screen">
  <header class="py-8">
    <div class="max-w-3xl mx-auto text-center">
      <h1 class="text-4xl font-extrabold text-purple-800 mb-2">Matematikbegrepp</h1>
      <p class="text-lg text-gray-700 mb-4">Klicka på ett begrepp för att se exempel.</p>
      <p class="text-sm text-purple-700 font-semibold">Skapad av Maria </p>
    </div>
  </header>
  <main class="max-w-2xl mx-auto px-4">
    <div class="grid gap-6">

      <!-- Exempel på expanderande begreppsknapp -->
      <div class="bg-white border border-purple-200 rounded-2xl shadow">
        <button 
          class="knapp w-full px-6 py-4 text-left text-xl font-semibold text-purple-700 focus:outline-none flex items-center justify-between"
          onclick="toggleCollapse('procentCollapse')"
        >
          Procent
          <span class="text-2xl">&#x25BC;</span>
        </button>
        <div id="procentCollapse" class="hidden px-6 pb-6 pt-2 text-gray-800">
          <p class="font-bold mb-2">Exempeluppgift:</p>
          <ul class="list-disc list-inside text-base mb-2">
            <li>Vad är 25% av 100?</li>
            <li>Repetera: Vad betyder procent?</li>
          </ul>
          <a href="procent.html" class="inline-block mt-2 px-4 py-2 text-xs bg-purple-100 text-purple-800 rounded hover:bg-purple-200">Visa fler PDF:er / material</a>
        </div>
      </div>

      <!-- Lägg till fler expanderande kort på liknande sätt -->
      <!--
      <div class="bg-white border border-teal-200 rounded-2xl shadow">
        <button class="knapp ..." onclick="toggleCollapse('brakCollapse')">Bråk ...</button>
        <div id="brakCollapse" class="hidden px-6 pb-6 pt-2 text-gray-800"> ... </div>
      </div>
      -->
    </div>
  </main>
  <script>
    function toggleCollapse(id) {
      const el = document.getElementById(id);
      el.classList.toggle('hidden');
    }
  </script>
</body>
</html>
